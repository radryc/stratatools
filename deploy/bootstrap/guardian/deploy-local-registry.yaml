apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-local-registry
  namespace: ${GUARDIAN_NAMESPACE}
  labels:
    app: guardian-local-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardian-local-registry
  template:
    metadata:
      labels:
        app: guardian-local-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: ${LOCAL_REGISTRY_PORT}
              name: registry
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          emptyDir: {}
