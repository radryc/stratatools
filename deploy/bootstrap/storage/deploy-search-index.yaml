apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-index
  namespace: ${STORAGE_NAMESPACE}
  labels:
    app: monofs-search
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: monofs-search
  template:
    metadata:
      labels:
        app: monofs-search
    spec:
      containers:
        - name: search
          image: ${MONOFS_SEARCH_IMAGE}
          imagePullPolicy: ${MONOFS_IMAGE_PULL_POLICY}
          args:
            - --port=9100
            - --diagnostics-addr=:9101
            - --index-dir=/data/indexes
          ports:
            - containerPort: 9100
            - containerPort: 9101
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: search-index-data
