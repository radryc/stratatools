apiVersion: apps/v1
kind: Deployment
metadata:
  name: monofs-haproxy
  namespace: ${LB_NAMESPACE}
  labels:
    app: monofs-haproxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: monofs-haproxy
  template:
    metadata:
      labels:
        app: monofs-haproxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
${LB_KIND_NODE_PLACEMENT}
      containers:
        - name: lb-edge
          image: ${MONOFS_LB_IMAGE}
          imagePullPolicy: ${MONOFS_IMAGE_PULL_POLICY}
          args:
            - -min-external-port
            - "${LB_DYNAMIC_PORT_MIN}"
            - -max-external-port
            - "${LB_DYNAMIC_PORT_MAX}"
          env:
            - name: LB_BOOTSTRAP
              value: "${LB_BOOTSTRAP}"
            - name: LB_REGISTRY_HTTP_ADDR
              value: "0.0.0.0:18081"
            - name: LB_REGISTRY_GRPC_ADDR
              value: "0.0.0.0:15051"
          ports:
            - containerPort: 9090
            - containerPort: 8080
            - containerPort: 8090
            - containerPort: 18081
            - containerPort: 15051
${LB_NODE_CONTAINER_PORTS}
${LB_USER_SERVICE_CONTAINER_PORTS}
