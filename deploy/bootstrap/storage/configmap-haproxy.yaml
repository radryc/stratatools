apiVersion: v1
kind: ConfigMap
metadata:
  name: monofs-haproxy
  namespace: ${STORAGE_NAMESPACE}
data:
  haproxy.cfg: |
    global
      daemon
    defaults
      mode tcp
      timeout connect 5s
      timeout client 30s
      timeout server 30s
    frontend monofs-grpc
      bind *:9090
      default_backend monofs-grpc-backend
    backend monofs-grpc-backend
      balance roundrobin
      server router-a router-a:9090 check
      server router-b router-b:9090 check
    frontend monofs-http
      mode http
      bind *:8080
      default_backend monofs-http-backend
    backend monofs-http-backend
      mode http
      balance roundrobin
      server router-a router-a:8080 check
      server router-b router-b:8080 check
