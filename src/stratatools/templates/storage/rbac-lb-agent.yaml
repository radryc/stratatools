apiVersion: v1
kind: ServiceAccount
metadata:
  name: lb-k8s-agent
  namespace: ${LB_NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lb-k8s-agent
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lb-k8s-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lb-k8s-agent
subjects:
  - kind: ServiceAccount
    name: lb-k8s-agent
    namespace: ${LB_NAMESPACE}
