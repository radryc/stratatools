apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcher-${SUFFIX}
  namespace: ${NAMESPACE}
  labels:
    app: monofs-fetcher
    component: fetcher-${SUFFIX}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: monofs-fetcher
      component: fetcher-${SUFFIX}
  template:
    metadata:
      labels:
        app: monofs-fetcher
        component: fetcher-${SUFFIX}
    spec:
      containers:
        - name: fetcher
          image: ${MONOFS_FETCHER_IMAGE}
          imagePullPolicy: ${MONOFS_IMAGE_PULL_POLICY}
          args:
            - --port=9200
            - --cache-dir=/data/cache
            - --config=/etc/monofs/fetcher-s3.json
          env:
            - name: MONOFS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: monofs-secrets
                  key: monofs-encryption-key
            - name: MONOFS_S3_REGION
              value: us-east-1
            - name: MONOFS_S3_BUCKET
              value: monofs
            - name: MONOFS_S3_ENDPOINT
              value: http://minio:9000
            - name: MONOFS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: monofs-secrets
                  key: minio-access-key
            - name: MONOFS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: monofs-secrets
                  key: minio-secret-key
            - name: MONOFS_S3_USE_PATH_STYLE
              value: "true"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: cache
              mountPath: /data/cache
            - name: config
              mountPath: /etc/monofs/fetcher-s3.json
              subPath: fetcher-s3.json
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: fetcher-${SUFFIX}-cache
        - name: config
          configMap:
            name: fetcher-s3-config
