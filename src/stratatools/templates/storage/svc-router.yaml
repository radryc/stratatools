apiVersion: v1
kind: Service
metadata:
  name: router-${SUFFIX}
  namespace: ${NAMESPACE}
spec:
  type: ClusterIP
  selector:
    app: monofs-router
    component: router-${SUFFIX}
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
    - name: http
      port: 8080
      targetPort: 8080
