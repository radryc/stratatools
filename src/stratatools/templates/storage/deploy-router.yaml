apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-${SUFFIX}
  namespace: ${NAMESPACE}
  labels:
    app: monofs-router
    component: router-${SUFFIX}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monofs-router
      component: router-${SUFFIX}
  template:
    metadata:
      labels:
        app: monofs-router
        component: router-${SUFFIX}
    spec:
      containers:
        - name: router
          image: ${MONOFS_ROUTER_IMAGE}
          args:
            - --port=9090
            - --http-port=8080
            - --router-name=${ROUTER_NAME}
            - --cluster-id=${MONOFS_CLUSTER_ID}
            - --peer-routers=${ROUTER_PEER_NAME}=http://${ROUTER_PEER_NAME}:8080
            - --nodes=${MONOFS_NODE_ADDRS}
            - --weights=node-a=100,node-b=100,node-c=100,node-d=100,node-e=100
            - --external-addrs=${MONOFS_EXTERNAL_ADDRS}
            - --search-addr=search-index:9100
            - --fetcher-addrs=fetcher-a:9200,fetcher-b:9200
            - --log-level=warn
          env:
            - name: MONOFS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: monofs-secrets
                  key: monofs-encryption-key
            - name: MONOFS_OTEL_ENDPOINT
              value: ${MONOFS_OTEL_ENDPOINT}
            - name: MONOFS_OTEL_INSECURE
              value: "${MONOFS_OTEL_INSECURE}"
            - name: MONOFS_OTEL_SERVICE_NAME
              value: monofs-router
            - name: MONOFS_OTEL_METRIC_INTERVAL
              value: ${MONOFS_OTEL_METRIC_INTERVAL}
          ports:
            - containerPort: 9090
            - containerPort: 8080
