apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-pusher-k8s
  namespace: ${NAMESPACE}
  labels:
    app: guardian-pusher-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardian-pusher-k8s
  template:
    metadata:
      labels:
        app: guardian-pusher-k8s
    spec:
      serviceAccountName: guardian
      containers:
        - name: pusher
          image: ${GUARDIAN_PUSHER_IMAGE}
          env:
            - name: GUARDIAN_PUSHER_NAME
              value: "${GUARDIAN_PUSHER_NAME}"
            - name: GUARDIAN_CLUSTER
              value: "${GUARDIAN_CLUSTER}"
            - name: GUARDIAN_MONOFS_ROUTER
              value: "${GUARDIAN_MONOFS_ROUTER}"
            - name: GUARDIAN_MONOFS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: guardian-secrets
                  key: monofs-token
            - name: GUARDIAN_MONOFS_USE_EXTERNAL_ADDRESSES
              value: "${GUARDIAN_MONOFS_USE_EXTERNAL_ADDRESSES}"
