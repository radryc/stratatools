apiVersion: guardian/v1alpha1
kind: Intent
metadata:
    name: monofs-storage
spec:
    intentType: standard
    targetPusher: k8s-main
    target:
        cluster: k8s-main
        namespace: monofs
    locked: false
    assets:
        - type: Compute
          name: minio
          version: 20260624-1558
          properties:
            image: mirror.gcr.io/minio/minio:latest
            imagePullPolicy: IfNotPresent
            observeExisting: true
            resources:
                limits:
                    cpu: "1"
                    memory: 1Gi
                requests:
                    cpu: 100m
                    memory: 256Mi
        - type: Compute
          name: fetcher-a
          version: 20260624-1558
          properties:
            image: monofs-fetcher:latest
            imagePullPolicy: IfNotPresent
            observeExisting: true
            resources:
                limits:
                    cpu: "1"
                    memory: 512Mi
                requests:
                    cpu: 100m
                    memory: 128Mi
        - type: Compute
          name: fetcher-b
          version: 20260624-1558
          properties:
            image: monofs-fetcher:latest
            imagePullPolicy: IfNotPresent
            observeExisting: true
