apiVersion: guardian/v1alpha1
kind: Intent
metadata:
  name: model-runners
spec:
  intentType: standard
  joins:
  - core
  targetPusher: docker-main
  target:
    cluster: docker-main
  locked: false
  assets:
  - type: Compute
    name: lolipop-model-runner
    version: 20260616-1548
    properties:
      args:
      - --host
      - 0.0.0.0
      - --port
      - '12434'
      - --model
      - /models/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-Q6_K.gguf
      - --ctx-size
      - '32768'
      - --n-gpu-layers
      - '99'
      - --flash-attn
      - 'on'
      - --threads
      - '8'
      - --parallel
      - '2'
      - --temp
      - '0.7'
      - --top-p
      - '0.8'
      - --top-k
      - '20'
      - --chat-template
      - chatml
      env:
        NVIDIA_VISIBLE_DEVICES: all
      gpus: all
      hostBindMounts:
      - source: /mnt/e/models/lolipop/models
        target: /models
      image: ghcr.io/ggml-org/llama.cpp:server-cuda
      ports:
      - containerPort: 12434
        name: api
        protocol: TCP
  - type: Compute
    name: lolipop-vl-runner
    version: 20260616-1548
    properties:
      args:
      - --host
      - 0.0.0.0
      - --port
      - '12435'
      - --model
      - /models/Qwen3VL-8B-Uncensored-HauhauCS-Aggressive-Q6_K.gguf
      - --ctx-size
      - '8192'
      - --n-gpu-layers
      - '99'
      - --flash-attn
      - 'on'
      - --threads
      - '4'
      - --parallel
      - '1'
      - --temp
      - '0.1'
      - --chat-template
      - qwen2vl
      env:
        NVIDIA_VISIBLE_DEVICES: all
      gpus: all
      hostBindMounts:
      - source: /mnt/e/models/lolipop/models
        target: /models
      image: ghcr.io/ggml-org/llama.cpp:server-cuda
      ports:
      - containerPort: 12435
        name: api
        protocol: TCP
  - type: LoadBalancer
    name: lolipop-llm-edge
    version: 20260616-1548
    dependsOn:
    - lolipop-model-runner
    properties:
      listeners:
      - name: api
        port: 23434
        protocol: TCP
      targets:
      - lolipop-model-runner
  - type: LoadBalancer
    name: lolipop-vlm-edge
    version: 20260616-1548
    dependsOn:
    - lolipop-vl-runner
    properties:
      listeners:
      - name: api
        port: 23435
        protocol: TCP
      targets:
      - lolipop-vl-runner
  - type: Compute
    name: lolipop-wangp
    version: 20260616-1548
    properties:
      env:
        CUDA_VISIBLE_DEVICES: '0'
        NVIDIA_DRIVER_CAPABILITIES: compute,utility
        NVIDIA_VISIBLE_DEVICES: all
        WANGP_ATTENTION: sdpa
        WANGP_PROFILE: '2'
        WANGP_ROLLOUT_REV: 20260608-2
      gpus: all
      hostBindMounts:
      - source: /mnt/e/models/lolipop/models
        target: /data/models
      - source: /mnt/e/models/lolipop/outputs
        target: /data/outputs
      - readOnly: true
        source: /mnt/e/models/lolipop/media
        target: /data/media
      - source: /mnt/e/models/lolipop/loras
        target: /data/loras
      - source: /mnt/e/models/lolipop/config
        target: /data/config
      - source: /mnt/e/models/lolipop/finetunes
        target: /workspace/finetunes
      - source: /mnt/e/models/lolipop/plugins
        target: /workspace/plugins
      - source: /home/rydzu/aiprojects/lolipop/wan2gp-docker/api_bridge.py
        target: /workspace/api_bridge.py
      - source: /home/rydzu/aiprojects/lolipop/wan2gp-docker/shared/attention.py
        target: /workspace/shared/attention.py
      - source: /home/rydzu/aiprojects/lolipop/wan2gp-docker/models/wan/modules/t5.py
        target: /workspace/models/wan/modules/t5.py
      - readOnly: true
        source: /mnt/e/models/lolipop/voices
        target: /data/voices
      - source: /mnt/e/models/lolipop/cache/huggingface
        target: /home/user/.cache/huggingface
      - source: /mnt/e/models/lolipop/cache/torch
        target: /home/user/.cache/torch
      image: lolipop-wangp:sha256-ccae670f6d5d1157
      imagePullPolicy: IfNotPresent
      ports:
      - containerPort: 7860
        name: ui
        protocol: TCP
      - containerPort: 7861
        name: bridge
        protocol: TCP
      shmSize: 16g
  - type: LoadBalancer
    name: lolipop-wangp-ui
    version: 20260616-1548
    dependsOn:
    - lolipop-wangp
    properties:
      listeners:
      - name: ui
        port: 7860
        protocol: TCP
      targets:
      - lolipop-wangp
  - type: LoadBalancer
    name: lolipop-wangp-bridge
    version: 20260616-1548
    dependsOn:
    - lolipop-wangp
    properties:
      listeners:
      - name: bridge
        port: 7861
        protocol: TCP
      targets:
      - lolipop-wangp
