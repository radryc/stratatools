apiVersion: guardian/v1alpha1
kind: Intent
metadata:
  name: workspace
spec:
  intentType: standard
  targetPusher: k8s-main
  target:
    cluster: k8s-main
    namespace: dev-workspace
  locked: false
  assets:
  - type: Volume
    name: workspace-data
    version: 20260527-0843
    properties:
      accessMode: ReadWriteOnce
      size: 20Gi
  - type: Volume
    name: monofs-state
    version: 20260527-0843
    properties:
      accessMode: ReadWriteOnce
      size: 10Gi
  - type: Volume
    name: monofs-cache
    version: 20260527-0843
    properties:
      accessMode: ReadWriteOnce
      size: 10Gi
  - type: Config
    name: ssh-authorized-keys
    version: 20260527-0843
    properties:
      data:
        authorized_keys: '# replace with your ssh public key to enable SSH access
          to the dev workspace

          '
      format: text
  - type: Compute
    name: vscode
    version: 20260527-0843
    dependsOn:
    - workspace-data
    - monofs-state
    - monofs-cache
    - ssh-authorized-keys
    payload:
      k8s: /partitions/dev-workspace/payloads/workspace.k8s.yaml
    properties:
      capabilities:
      - SYS_ADMIN
      configMounts:
      - config: ssh-authorized-keys
        path: /etc/dev-workspace/ssh
        readOnly: true
      env:
        GITFS_OVERLAY_DIR: /home/developer/.monofs/overlay
        KUBE_NAMESPACE: dev-workspace
        MONOFS_MOUNT: /mnt/monofs
        MONOFS_ROUTER: monofs-external.monofs.svc.cluster.local:9090
        ROUTER_ADDR: monofs-external.monofs.svc.cluster.local:9090
        VSCODE_CONNECTION_TOKEN: dev-workspace-token-change-me
        VSCODE_DEFAULT_FOLDER: /workspace/monofs
        VSCODE_PORT: '8888'
        WORKSPACE_ROOT: /workspace
      hostBindMounts:
      - source: /dev/fuse
        target: /dev/fuse
      image: dev-workspace-vscode:sha256-ee0d30c11643bfe6
      imagePullPolicy: IfNotPresent
      ports:
      - containerPort: 8888
        name: http
        protocol: TCP
        servicePort: 8888
      - containerPort: 22
        name: ssh
        protocol: TCP
        servicePort: 2222
      privileged: true
      resources:
        limits:
          cpu: '2'
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
      volumeMounts:
      - path: /workspace
        volume: workspace-data
      - path: /home/developer/.monofs
        volume: monofs-state
      - path: /var/cache/monofs
        volume: monofs-cache
  - type: LoadBalancer
    name: vscode-edge
    version: 20260527-0843
    dependsOn:
    - vscode
    payload:
      k8s: /partitions/dev-workspace/payloads/edge.k8s.yaml
    properties:
      listeners:
      - name: http
        port: 8888
        protocol: TCP
      - name: ssh
        port: 2222
        protocol: TCP
      serviceType: LoadBalancer
      targets:
      - vscode
