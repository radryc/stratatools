global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    retries 3

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout retry 1s
    hold valid 10s

# HAProxy statistics page
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# gRPC frontend (port 9090)
frontend monofs_grpc
    bind *:9090
    mode tcp
    default_backend monofs_routers_grpc

# HTTP API frontend (port 8080)
frontend monofs_http
    bind *:8080
    mode http
    default_backend monofs_routers_http

# gRPC backend - primary/backup failover (all traffic to router-a unless down)
backend monofs_routers_grpc
    mode tcp
    balance roundrobin
    option tcp-check
    
    server router-a router-a:9090 check inter 5s fall 3 rise 2 resolvers docker resolve-prefer ipv4 init-addr libc,none
    server router-b router-b:9090 check inter 5s fall 3 rise 2 backup resolvers docker resolve-prefer ipv4 init-addr libc,none

# HTTP backend - primary/backup failover (all traffic to router-a unless down)
backend monofs_routers_http
    mode http
    balance roundrobin
    option httpchk GET /health
    
    # Enable cookie-based session stickiness
    cookie MONOFS_ROUTER insert indirect nocache httponly
    
    server router-a router-a:8080 check inter 5s fall 3 rise 2 cookie router-a resolvers docker resolve-prefer ipv4 init-addr libc,none
    server router-b router-b:8080 check inter 5s fall 3 rise 2 cookie router-b backup resolvers docker resolve-prefer ipv4 init-addr libc,none
