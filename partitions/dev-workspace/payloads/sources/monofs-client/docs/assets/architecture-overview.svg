<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <defs>
        <linearGradient id="gradClient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#0284c7" />
        </linearGradient>
        <linearGradient id="gradRouter" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818cf8" />
            <stop offset="100%" stop-color="#4f46e5" />
        </linearGradient>
        <linearGradient id="gradStorage" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <linearGradient id="gradFetcher" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24" />
            <stop offset="100%" stop-color="#d97706" />
        </linearGradient>
        <linearGradient id="gradSearch" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f472b6" />
            <stop offset="100%" stop-color="#db2777" />
        </linearGradient>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
    </defs>

    <g stroke="#1e293b" stroke-width="1" opacity="0.5">
        <line x1="0" y1="100" x2="900" y2="100" />
        <line x1="0" y1="200" x2="900" y2="200" />
        <line x1="0" y1="300" x2="900" y2="300" />
        <line x1="0" y1="400" x2="900" y2="400" />
        <line x1="0" y1="500" x2="900" y2="500" />
        <line x1="150" y1="0" x2="150" y2="600" />
        <line x1="300" y1="0" x2="300" y2="600" />
        <line x1="450" y1="0" x2="450" y2="600" />
        <line x1="600" y1="0" x2="600" y2="600" />
        <line x1="750" y1="0" x2="750" y2="600" />
    </g>

    <text x="450" y="50" fill="#f8fafc" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="1">MonoFS Architecture</text>
    <text x="450" y="80" fill="#94a3b8" font-size="14" text-anchor="middle">Distributed source workspaces and publish workflows</text>

    <path d="M 230 250 C 350 250, 350 180, 450 180" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
    <path d="M 230 250 C 350 250, 350 400, 450 400" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)" />
    <path d="M 550 180 C 650 180, 650 230, 750 230" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M 500 220 L 500 280" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M 750 280 C 750 350, 800 400, 800 450" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M 550 400 C 650 400, 650 280, 750 280" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowhead)" />

    <rect x="50" y="150" width="220" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" opacity="0.8" />
    <text x="160" y="180" fill="#cbd5e1" font-size="14" font-weight="bold" text-anchor="middle">Local Developer Machine</text>
    
    <g transform="translate(80, 210)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#gradClient)" filter="url(#glow)" />
        <text x="80" y="35" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">FUSE Client</text>
        <text x="80" y="55" fill="#e0f2fe" font-size="12" text-anchor="middle">Virtual Monorepo Mount</text>
        <text x="80" y="70" fill="#e0f2fe" font-size="11" text-anchor="middle">+ Writable Overlay</text>
    </g>

    <rect x="350" y="110" width="500" height="420" rx="16" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,8" />
    <text x="600" y="135" fill="#94a3b8" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="2">MONOFS CLUSTER</text>

    <g transform="translate(400, 150)">
        <rect x="0" y="0" width="200" height="70" rx="8" fill="url(#gradRouter)" filter="url(#glow)" />
        <text x="100" y="30" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">Router (Control Plane)</text>
        <text x="100" y="50" fill="#e0e7ff" font-size="12" text-anchor="middle">Sync, Topology, UI</text>
    </g>

    <g transform="translate(425, 280)">
        <rect x="0" y="0" width="150" height="50" rx="8" fill="url(#gradSearch)" />
        <text x="75" y="22" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Search Service</text>
        <text x="75" y="40" fill="#fce7f3" font-size="11" text-anchor="middle">Out-of-band Indexing</text>
    </g>

    <g transform="translate(400, 370)">
        <rect x="0" y="0" width="200" height="80" rx="8" fill="url(#gradStorage)" filter="url(#glow)" />
        <text x="100" y="30" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">Storage Nodes</text>
        <text x="100" y="50" fill="#d1fae5" font-size="12" text-anchor="middle">Indexed-Tail Backend</text>
        <text x="100" y="65" fill="#d1fae5" font-size="11" text-anchor="middle">(WORM Format)</text>
    </g>

    <g transform="translate(680, 200)">
        <rect x="0" y="0" width="140" height="80" rx="8" fill="url(#gradFetcher)" filter="url(#glow)" />
        <text x="70" y="35" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">Fetcher Tier</text>
        <text x="70" y="55" fill="#fef3c7" font-size="12" text-anchor="middle">Upstream Bridge</text>
    </g>

    <g transform="translate(680, 420)">
        <path d="M 20 0 L 120 0 A 20 20 0 0 1 140 20 L 140 60 A 20 20 0 0 1 120 80 L 20 80 A 20 20 0 0 1 0 60 L 0 20 A 20 20 0 0 1 20 0 Z" fill="#334155" />
        <text x="70" y="35" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">Upstream Git</text>
        <text x="70" y="55" fill="#cbd5e1" font-size="12" text-anchor="middle">&amp; Object Store</text>
    </g>

    <text x="290" y="210" fill="#cbd5e1" font-size="11" text-anchor="middle" font-style="italic">Control / Publish</text>
    <text x="310" y="350" fill="#cbd5e1" font-size="11" text-anchor="middle" font-style="italic">High-speed Read Path</text>
    <text x="625" y="195" fill="#cbd5e1" font-size="11" text-anchor="middle" font-style="italic">Job Dispatch</text>
    <text x="805" y="360" fill="#cbd5e1" font-size="11" text-anchor="start" font-style="italic">Push / Pull</text>
</svg>
