syntax = "proto3";
package monofs;
option go_package = "github.com/radryc/monofs/api/proto";

import "api/proto/monofs.proto";

// BlobFetcher service - stateless proxies for external data sources.
// Runs in DMZ with external network access. Storage nodes call this
// to fetch blobs without needing direct external connectivity.
service BlobFetcher {
    // Synchronous fetch - blocks until blob is returned or error.
    // Used for cache misses that need immediate data.
    rpc FetchBlob(FetchBlobRequest) returns (stream DataChunk);
    
    // Batch fetch - parallel retrieval of multiple blobs.
    // Used for bulk prefetch operations.
    rpc FetchBlobBatch(FetchBlobBatchRequest) returns (stream FetchBlobBatchResponse);
    
    // Async prefetch - best-effort background fetch.
    // Returns immediately, blobs fetched in background.
    // Caller should poll or re-request via FetchBlob.
    rpc PrefetchBlobs(PrefetchRequest) returns (PrefetchResponse);
    
    // Check if blobs are ready (cached on fetcher).
    rpc CheckCache(CheckCacheRequest) returns (CheckCacheResponse);
    
    // Service health and statistics.
    rpc GetStats(FetcherStatsRequest) returns (FetcherStatsResponse);

    // Store a single blob on the fetcher.
    // Called by storage nodes during ingestion.
    rpc StoreBlob(StoreBlobRequest) returns (StoreBlobResponse);

    // Store multiple blobs as packed archives via client-streaming.
    // The client streams StoreBlobEntry messages; the fetcher packs them
    // into archive(s) splitting at ~512 MB. This avoids thousands of
    // individual loose files and supports arbitrarily large pushes.
    rpc StoreBlobBatchStream(stream StoreBlobEntry) returns (StoreBlobBatchResponse);

    // Delete blobs from the fetcher's index and optionally clean up
    // archives that become empty.
    rpc DeleteBlobs(DeleteBlobsRequest) returns (DeleteBlobsResponse);

    // Store a packager archive on the fetcher.
    // Called by the router during ingestion to push pre-built archives.
    rpc StoreArchive(stream StoreArchiveChunk) returns (StoreArchiveResponse);
}

// RepoSyncWorker performs remote Git sync operations in the DMZ tier.
// Router orchestrates jobs; the worker talks to upstream repositories.
service RepoSyncWorker {
    rpc StageWorkspaceBundle(stream WorkspaceBundleChunk) returns (StageWorkspaceBundleResponse);
    rpc StageWorkspaceCommitBundle(stream WorkspaceBundleChunk) returns (StageWorkspaceBundleResponse);
    rpc StartWorkspacePublish(StartWorkspacePublishRequest) returns (stream RepoSyncProgress);
    rpc StartWorkspaceCommitPush(StartWorkspaceCommitPushRequest) returns (stream RepoSyncProgress);
    rpc ProbeWorkspaceRefresh(ProbeWorkspaceRefreshRequest) returns (stream RepoSyncProgress);
    rpc DiscardWorkspaceBundle(DiscardWorkspaceBundleRequest) returns (DiscardWorkspaceBundleResponse);
    rpc GetSyncWorkerStats(SyncWorkerStatsRequest) returns (SyncWorkerStatsResponse);
}

// SourceType is defined in monofs.proto (imported above)

message FetchBlobRequest {
    // Content identifier (interpretation depends on source_type):
    // - GIT: blob SHA hash
    // - BLOB: blob hash within packager archive
    string content_id = 1;
    
    // Source type determines which backend handles the request.
    SourceType source_type = 2;
    
    // Source-specific configuration:
    // GIT: repo_url, branch, display_path
    // BLOB: storage_id
    map<string, string> source_config = 3;
    
    // Request metadata for tracing/metrics.
    string request_id = 10;
    string storage_node_id = 11;
    string storage_id = 12;       // Repository storage ID (for affinity routing)
    
    // Priority: 0 = highest (sync read), 10 = lowest (speculative prefetch)
    int32 priority = 13;
}

// DataChunk streams blob content back to caller.
// Reusing existing DataChunk from monofs.proto.
// message DataChunk {
//     bytes data = 1;
//     bool is_last = 2;
// }

message FetchBlobBatchRequest {
    repeated FetchBlobRequest blobs = 1;
    
    // Max concurrent fetches (0 = use server default).
    int32 concurrency = 2;
    
    // Stop on first error vs. continue and report all errors.
    bool fail_fast = 3;
}

message FetchBlobBatchResponse {
    // Content ID from the request.
    string content_id = 1;
    
    // Blob data (for small blobs) or empty if streaming separately.
    bytes data = 2;
    
    // Size in bytes.
    int64 size = 3;
    
    // True if this blob was served from fetcher's local cache.
    bool from_cache = 4;
    
    // Fetch latency in milliseconds (0 if from cache).
    int64 fetch_latency_ms = 5;
    
    // Error message (empty on success).
    string error = 6;
    
    // Indicates this is the last response in the batch.
    bool batch_complete = 10;
}

message PrefetchRequest {
    // Blobs to prefetch (same format as FetchBlobRequest).
    repeated FetchBlobRequest blobs = 1;
    
    // Callback URL for completion notification (optional).
    // If set, fetcher will POST to this URL when prefetch completes.
    string callback_url = 2;
    
    // TTL for prefetched blobs in fetcher cache (seconds).
    // 0 = use server default.
    int32 cache_ttl_seconds = 3;
}

message PrefetchResponse {
    // Job ID for tracking (can be used with CheckCache).
    string job_id = 1;
    
    // Number of blobs accepted for prefetch.
    int32 accepted = 2;
    
    // Number of blobs already cached (will skip fetch).
    int32 already_cached = 3;
    
    // Number of blobs rejected (invalid request, etc.).
    int32 rejected = 4;
}

message CheckCacheRequest {
    // Content IDs to check.
    repeated string content_ids = 1;
    
    // Source type (needed to identify cache keys).
    SourceType source_type = 2;
}

message CheckCacheResponse {
    // Map of content_id -> cached (true/false).
    map<string, bool> cached = 1;
    
    // Map of content_id -> size in bytes (only for cached items).
    map<string, int64> sizes = 2;
}

message FetcherStatsRequest {
    // Include detailed per-source stats.
    bool include_source_stats = 1;
    
    // Include cache contents summary.
    bool include_cache_stats = 2;
}

message FetcherStatsResponse {
    // Fetcher instance ID.
    string fetcher_id = 1;
    
    // Uptime in seconds.
    int64 uptime_seconds = 2;
    
    // Total requests served.
    int64 total_requests = 3;
    
    // Cache statistics.
    int64 cache_hits = 4;
    int64 cache_misses = 5;
    double cache_hit_rate = 6;
    int64 cache_size_bytes = 7;
    int64 cache_entries = 8;
    
    // Active operations.
    int64 active_fetches = 9;
    int64 queued_prefetches = 10;
    
    // Per-source statistics.
    map<string, SourceStats> source_stats = 11;
    
    // Bytes transferred.
    int64 bytes_fetched = 12;
    int64 bytes_served = 13;

    // Sync worker statistics for workspace refresh/publish operations.
    SyncWorkerStats sync_worker = 14;
}

message SourceStats {
    int64 requests = 1;
    int64 errors = 2;
    int64 bytes_fetched = 3;
    double avg_latency_ms = 4;
    int64 cached_items = 5;
    int64 cache_bytes = 6;
}

enum RepoSyncStatus {
    REPO_SYNC_STATUS_UNSPECIFIED = 0;
    REPO_SYNC_STATUS_UNCHANGED = 1;
    REPO_SYNC_STATUS_ADVANCED = 2;
    REPO_SYNC_STATUS_DIVERGED = 3;
    REPO_SYNC_STATUS_MISSING_BRANCH = 4;
    REPO_SYNC_STATUS_AUTH_FAILED = 5;
    REPO_SYNC_STATUS_TRANSIENT_ERROR = 6;
    REPO_SYNC_STATUS_FAILED = 7;
    REPO_SYNC_STATUS_PUBLISHED = 8;
    REPO_SYNC_STATUS_CONFLICT = 9;
}

message StageWorkspaceBundleResponse {
    string bundle_id = 1;
    string workspace_id = 2;
    int64 bytes_received = 3;
    int32 repository_count = 4;
    int64 expires_at_unix = 5;
}

message StartWorkspacePublishRequest {
    string job_id = 1;
    string workspace_id = 2;
    string bundle_id = 3;
    string logical_commit_message = 4;
    string author_name = 5;
    string author_email = 6;
    string requested_branch_strategy = 7;
}

message StartWorkspaceCommitPushRequest {
    string job_id = 1;
    string workspace_id = 2;
    string bundle_id = 3;
    string logical_branch = 4;
}

message ProbeWorkspaceRefreshRequest {
    string job_id = 1;
    string workspace_id = 2;
    repeated WorkspaceRepositoryRef repositories = 3;
}

message DiscardWorkspaceBundleRequest {
    string bundle_id = 1;
}

message DiscardWorkspaceBundleResponse {
    bool success = 1;
    string message = 2;
}

message RepoSyncProgress {
    string job_id = 1;
    WorkspaceRepositoryRef repository = 2;
    RepoSyncStatus status = 3;
    string remote_commit = 4;
    string message = 5;
    string pushed_commit = 6;
    string target_branch = 7;
    string conflict_reason = 8;
}

message SyncWorkerStatsRequest {}

message SyncWorkerStats {
    int64 total_jobs = 1;
    int64 active_jobs = 2;
    int64 completed_jobs = 3;
    int64 failed_jobs = 4;
    int64 refresh_probes = 5;
    int64 refresh_probe_failures = 6;
    int64 git_cache_entries = 7;
    int64 publish_jobs = 8;
    int64 published_repositories = 9;
    int64 staged_bundles = 10;
    int64 staged_bundle_bytes = 11;
    int64 worktree_bytes = 12;
    int64 bundle_stage_failures = 13;
}

message SyncWorkerStatsResponse {
    SyncWorkerStats stats = 1;
}

// ============================================================
// Prediction-related messages (for storage node -> router comm)
// ============================================================

// Access event reported by storage nodes for prediction training.
message AccessEvent {
    string client_id = 1;         // FUSE client identifier
    string storage_id = 2;        // Repository storage ID
    string file_path = 3;         // Path within repository
    int64 timestamp = 4;          // Unix timestamp (nanoseconds)
    AccessType access_type = 5;   // Type of access
    string session_id = 6;        // Groups related accesses
    string node_id = 7;           // Storage node that served the request
}

enum AccessType {
    ACCESS_TYPE_UNKNOWN = 0;
    ACCESS_TYPE_READ = 1;         // File content read
    ACCESS_TYPE_READDIR = 2;      // Directory listing
    ACCESS_TYPE_LOOKUP = 3;       // File/dir existence check
    ACCESS_TYPE_GETATTR = 4;      // Metadata retrieval
}

// Storage nodes report access events to router for global prediction.
message ReportAccessRequest {
    repeated AccessEvent events = 1;
}

message ReportAccessResponse {
    int32 accepted = 1;
}

// Request predictions for a file (what should be prefetched next).
message GetPredictionsRequest {
    string storage_id = 1;
    string file_path = 2;
    string client_id = 3;
    int32 max_results = 4;
    float min_probability = 5;
}

message GetPredictionsResponse {
    repeated PredictedFile predictions = 1;
}

message PredictedFile {
    string storage_id = 1;
    string file_path = 2;
    float probability = 3;
    string source = 4;            // "markov", "cluster", "structural", "temporal"
    string content_id = 5;        // Blob hash for fetching
    SourceType source_type = 6;   // How to fetch
    map<string, string> source_config = 7;
}

// StoreBlob stores a single blob on the fetcher.
message StoreBlobRequest {
    // SHA-256 hash of the blob content (used as storage key).
    string blob_hash = 1;
    
    // Raw blob content.
    bytes content = 2;
    
    // Request ID for tracing.
    string request_id = 3;
}

message StoreBlobResponse {
    bool success = 1;
    string error_message = 2;
    // Size of stored blob in bytes.
    int64 size = 3;
}

// StoreArchiveChunk streams a packager archive to the fetcher.
// The first chunk must contain the header with storage_id.
message StoreArchiveChunk {
    // Storage ID this archive belongs to (set in first chunk).
    string storage_id = 1;

    // Archive chunk index (for split archives, 0-based).
    int32 chunk_index = 2;
    
    // Raw archive data.
    bytes data = 3;
    
    // True if this is the last chunk of this archive piece.
    bool is_last = 4;
}

message StoreArchiveResponse {
    bool success = 1;
    string error_message = 2;
    // Total bytes stored.
    int64 total_bytes = 3;
    // Number of files indexed from the archive.
    int64 files_indexed = 4;
}

// StoreBlobEntry is a single blob (or chunk of a blob) sent in a
// StoreBlobBatchStream.  Small blobs are sent as one message with
// chunk_index=0 and is_last=true (the default).  Large blobs are
// split across multiple messages sharing the same blob_hash;
// chunk_index increments from 0 and the final chunk sets is_last=true.
message StoreBlobEntry {
    // SHA-256 hash of the full blob content (used as storage/index key).
    string blob_hash = 1;
    // Raw blob content (or a chunk of it for large blobs).
    bytes content = 2;
    // Chunk sequence number within this blob (0-based).
    int32 chunk_index = 3;
    // True when this is the last (or only) chunk for this blob_hash.
    bool is_last = 4;
    // Total uncompressed size of the complete blob in bytes.
    // Only required on the first chunk (chunk_index == 0).
    int64 total_size = 5;
}

// StoreBlobBatchResponse summarises the streaming batch storage operation.
message StoreBlobBatchResponse {
    bool success = 1;
    string error_message = 2;
    // Number of blobs written to archive(s).
    int32 stored = 3;
    // Number of blobs skipped (already indexed).
    int32 skipped = 4;
    // Number of blobs that failed.
    int32 failed = 5;
    // Total archive bytes written to disk.
    int64 archive_bytes = 6;
    // Number of archive files created.
    int32 archives_created = 7;
}

// DeleteBlobsRequest asks the fetcher to remove blobs from its index.
message DeleteBlobsRequest {
    // SHA-256 hashes of blobs to delete.
    repeated string blob_hashes = 1;
    // When true, also remove archive files that become empty after
    // deleting these entries (compaction). Default false.
    bool compact = 2;
}

// DeleteBlobsResponse reports how many blobs were deleted.
message DeleteBlobsResponse {
    bool success = 1;
    string error_message = 2;
    // Number of blobs removed from the index.
    int32 deleted = 3;
    // Number of hashes not found in the index.
    int32 not_found = 4;
    // Number of archive files removed during compaction.
    int32 archives_removed = 5;
}
