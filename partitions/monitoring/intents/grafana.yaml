          : \"auto\"\n      },\n      \"targets\": [\n        {\n          \"refId\"\
          : \"A\",\n          \"expr\": \"avg(up{service=\\\"monofs-router\\\"}) OR\
          \ vector(0)\",\n          \"legendFormat\": \"router\"\n        }\n    \
          \  ]\n    },\n    {\n      \"id\": 3,\n      \"type\": \"stat\",\n     \
