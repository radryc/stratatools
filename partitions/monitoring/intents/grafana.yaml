        - type: Config
          name: grafana-dashboards-doctor
          version: 20260521-1139
          properties:
            data:
                doctor-comprehensive-health.json: |
                    {
                      "uid": "doctor-comprehensive-health",
                      "title": "Doctor - Telemetry Intake Cockpit",
                      "tags": [
                        "doctor",
                        "health",
                        "buffers",
                        "grafana-13",
                        "logs",
                        "traces"
                      ],
                      "schemaVersion": 39,
                      "version": 6,
                      "refresh": "15s",
                      "time": {
                        "from": "now-15m",
                        "to": "now"
                      },
                      "editable": true,
                      "links": [
                        {
                          "title": "Guardian",
                          "type": "dashboards",
                          "tags": [
                            "guardian"
                          ]
                        },
                        {
                          "title": "MonoFS",
                          "type": "dashboards",
                          "tags": [
                            "monofs"
                          ]
                        },
                        {
                          "title": "System Graph",
                          "type": "dashboards",
                          "tags": [
                            "system",
                            "topology"
                          ]
                        }
                      ],
                      "annotations": {
                        "list": [
                          {
                            "datasource": {
                              "type": "loki",
                              "uid": "doctor-logs"
                            },
                            "enable": true,
                            "expr": "{service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\"",
                            "hide": false,
                            "iconColor": "#FF780A",
                            "name": "Releases",
                            "titleFormat": "{{partition}}/{{intent}} {{release}}",
                            "textFormat": "deployment: {{deployment_revision}}"
                          }
                        ]
                      },
                      "templating": {
                        "list": [
                          {
                            "name": "filters",
                            "label": "Metric filters",
                            "type": "adhoc",
                            "datasource": {
                              "type": "prometheus",
                              "uid": "prometheus"
                            },
                            "hide": 0
                          },
                          {
                            "name": "traceId",
                            "label": "Trace ID",
                            "type": "textbox",
                            "query": "latest",
                            "current": {
                              "text": "latest",
                              "value": "latest"
                            },
                            "hide": 0
                          }
                        ]
                      },
                      "panels": [
                        {
                          "id": 1,
                          "type": "text",
                          "title": "Doctor Health Model",
                          "gridPos": {
                            "h": 5,
                            "w": 8,
                            "x": 0,
                            "y": 0
                          },
                          "options": {
                            "mode": "markdown",
                            "content": "### Doctor telemetry intake\nDoctor is split into `doctor-ingest` and `doctor-query`. This cockpit puts component readiness, accepted telemetry rate, and backlog first, then breaks the ingest stream down by logs, metrics, and traces.\n\nThe direct `doctor_component` label matcher is intentionally avoided here because this Doctor PromQL backend currently returns empty vectors for that matcher; readiness cards use the verified join workaround."
                          }
                        },
                        {
                          "id": 2,
                          "type": "stat",
                          "title": "Doctor Query",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 8,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "mappings": [
                                {
                                  "type": "value",
                                  "options": {
                                    "0": {
                                      "text": "Down"
                                    },
                                    "1": {
                                      "text": "Up"
                                    }
                                  }
                                }
                              ],
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "red",
                                    "value": 0
                                  },
                                  {
                                    "color": "green",
                                    "value": 1
                                  }
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "background",
                            "graphMode": "none",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum((max by (doctor_component) (doctor_component_up)) * on(doctor_component) group_left() label_replace(vector(1), \"doctor_component\", \"doctor-query\", \"__name__\", \".*\")) OR vector(0)",
                              "legendFormat": "query"
                            }
                          ]
                        },
                        {
                          "id": 3,
                          "type": "stat",
                          "title": "Doctor Ingest",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 12,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "mappings": [
                                {
                                  "type": "value",
                                  "options": {
                                    "0": {
                                      "text": "Down"
                                    },
                                    "1": {
                                      "text": "Up"
                                    }
                                  }
                                }
                              ],
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "red",
                                    "value": 0
                                  },
                                  {
                                    "color": "green",
                                    "value": 1
                                  }
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "background",
                            "graphMode": "none",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum((max by (doctor_component) (doctor_component_up)) * on(doctor_component) group_left() label_replace(vector(1), \"doctor_component\", \"doctor-ingest\", \"__name__\", \".*\")) OR vector(0)",
                              "legendFormat": "ingest"
                            }
                          ]
                        },
                        {
                          "id": 4,
                          "type": "stat",
                          "title": "Accepted Requests / s",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 16,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "ops"
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum(rate(doctor_ingest_requests_accepted[$__rate_interval])) OR vector(0)",
                              "legendFormat": "requests/s"
                            }
                          ]
                        },
                        {
                          "id": 5,
                          "type": "stat",
                          "title": "Accepted Records / s",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 20,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "ops"
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum(rate(doctor_ingest_records_accepted[$__rate_interval])) OR vector(0)",
