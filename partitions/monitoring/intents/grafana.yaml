apiVersion: guardian/v1alpha1
kind: Intent
metadata:
  name: grafana
spec:
  intentType: standard
  targetPusher: k8s-main
  target:
    cluster: k8s-main
    namespace: monitoring
  locked: false
  assets:
  - type: Config
    name: grafana-datasources
    version: 20260603-1038
    properties:
      data:
        datasources.yaml: "apiVersion: 1\ndatasources:\n  - name: Doctor Metrics\n\
          \    uid: prometheus\n    type: prometheus\n    access: proxy\n    url:\
          \ http://k8s-svc-lb-k8s-main-doctor-doctor-query-query-edge.doctor.svc.cluster.local:18080\n\
          \    isDefault: true\n    editable: true\n  - name: Doctor Logs\n    uid:\
          \ doctor-logs\n    type: loki\n    access: proxy\n    url: http://k8s-svc-lb-k8s-main-doctor-doctor-query-query-edge.doctor.svc.cluster.local:18080\n\
          \    editable: true\n  - name: Doctor Traces\n    uid: doctor-traces\n \
          \   type: zipkin\n    access: proxy\n    url: http://k8s-svc-lb-k8s-main-doctor-doctor-query-query-edge.doctor.svc.cluster.local:18080\n\
          \    jsonData:\n      tracesToLogsV2:\n        datasourceUid: doctor-logs\n\
          \        spanStartTimeShift: -5m\n        spanEndTimeShift: 5m\n       \
          \ tags:\n          - service.name\n          - k8s.pod.name\n          -\
          \ doctor.component\n        filterByTraceID: true\n        filterBySpanID:\
          \ false\n      traceQuery:\n        timeShiftEnabled: true\n        spanStartTimeShift:\
          \ 1h\n        spanEndTimeShift: 1h\n      nodeGraph:\n        enabled: true\n\
          \      spanBar:\n        type: Duration\n    editable: true\n"
      format: yaml
  - type: Config
    name: grafana-dashboards-provider
    version: 20260603-1038
    properties:
      data:
        dashboards.yaml: "apiVersion: 1\nproviders:\n  - name: MonoFS\n    folder:\
          \ MonoFS\n    type: file\n    disableDeletion: false\n    editable: true\n\
          \    updateIntervalSeconds: 30\n    options:\n      path: /etc/grafana/dashboards/monofs\n\
          \  - name: Guardian\n    folder: Guardian\n    type: file\n    disableDeletion:\
          \ false\n    editable: true\n    updateIntervalSeconds: 30\n    options:\n\
          \      path: /etc/grafana/dashboards/guardian\n  - name: Doctor\n    folder:\
          \ Doctor\n    type: file\n    disableDeletion: false\n    editable: true\n\
          \    updateIntervalSeconds: 30\n    options:\n      path: /etc/grafana/dashboards/doctor\n\
          \  - name: System\n    folder: System\n    type: file\n    disableDeletion:\
          \ false\n    editable: true\n    updateIntervalSeconds: 30\n    options:\n\
          \      path: /etc/grafana/dashboards/system\n  - name: Guardian Rollouts\n\
          \    folder: Guardian Rollouts\n    type: file\n    disableDeletion: false\n\
          \    editable: true\n    updateIntervalSeconds: 30\n    options:\n     \
          \ path: /etc/grafana/dashboards/guardian-rollouts\n"
      format: yaml
  - type: Config
