        - type: Config
          name: grafana-dashboards-guardian-rollouts
          version: 20260521-1139
          properties:
            data:
                guardian-intent-rollout-correlation.json: |
                    {
                      "uid": "guardian-intent-rollout-correlation",
                      "title": "Guardian Rollouts - Intent Correlation",
                      "tags": ["guardian-rollouts", "guardian-intent-correlation", "grafana-13", "metrics", "logs"],
                      "schemaVersion": 39,
                      "version": 1,
                      "refresh": "15s",
                      "time": {"from": "now-30m", "to": "now"},
                      "editable": true,
                      "links": [
                        {"title": "Partition Lens", "type": "dashboards", "tags": ["guardian-releases", "partitions"]},
                        {"title": "Guardian Health", "type": "dashboards", "tags": ["guardian"]},
                        {"title": "K8s Cluster Watch", "type": "dashboards", "tags": ["k8s", "resources"]}
                      ],
                      "annotations": {
                        "list": [
                          {
                            "datasource": {"type": "loki", "uid": "doctor-logs"},
                            "enable": true,
                            "expr": "{service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\" | partition=~\"$partition\" | intent=~\"$intent\"",
                            "hide": false,
                            "iconColor": "#FF780A",
                            "name": "Guardian Intent Rollouts",
                            "titleFormat": "{{partition}}/{{intent}} {{release}}",
                            "textFormat": "deployment: {{deployment_revision}}"
                          }
                        ]
                      },
                      "templating": {
                        "list": [
                          {"name": "filters", "label": "Metric filters", "type": "adhoc", "datasource": {"type": "prometheus", "uid": "prometheus"}, "hide": 0},
                          {"name": "partition", "label": "Partition Regex", "type": "textbox", "query": ".*", "current": {"text": ".*", "value": ".*"}, "hide": 0},
                          {"name": "intent", "label": "Intent Regex", "type": "textbox", "query": ".*", "current": {"text": ".*", "value": ".*"}, "hide": 0}
                        ]
                      },
                      "panels": [
                        {
                          "id": 1,
                          "type": "text",
                          "title": "Intent Rollout Correlation",
                          "gridPos": {"h": 5, "w": 10, "x": 0, "y": 0},
                          "options": {
                            "mode": "markdown",
                            "content": "### Guardian releases against pod resources\nGuardian release logs carry `partition`, `intent`, `release`, `deployment_revision`, and `status` after a tagged rollout is archived. CPU and memory are matched by pod names inside the selected partition namespace because the current Prometheus stream does not expose intent labels directly. Per-intent network usage is not available in the current Guardian + `k8s-top` data path."
                          }
                        },
                        {
                          "id": 2,
                          "type": "stat",
                          "title": "Guardian Release Events In Range",
                          "datasource": {"type": "loki", "uid": "doctor-logs"},
                          "gridPos": {"h": 5, "w": 4, "x": 10, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
                          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto"},
                          "targets": [
                            {"refId": "A", "expr": "sum(count_over_time({service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\" | partition=~\"$partition\" | intent=~\"$intent\" [$__range]))"}
                          ]
                        },
                        {
                          "id": 3,
                          "type": "stat",
                          "title": "Matching Pods",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 4, "x": 14, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
                          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto"},
                          "targets": [
                            {"refId": "A", "expr": "count(max by (k8s_pod_name) (k8s_top_pod_cpu_usage_millicores{k8s_namespace_name=~\"$partition\", k8s_pod_name=~\".*$intent.*\"})) OR vector(0)", "legendFormat": "pods"}
                          ]
                        },
                        {
                          "id": 4,
                          "type": "stat",
                          "title": "Matching CPU",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 3, "x": 18, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "m"}, "overrides": []},
                          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto"},
                          "targets": [
                            {"refId": "A", "expr": "sum(k8s_top_pod_cpu_usage_millicores{k8s_namespace_name=~\"$partition\", k8s_pod_name=~\".*$intent.*\"}) OR vector(0)", "legendFormat": "cpu"}
                          ]
                        },
                        {
                          "id": 5,
                          "type": "stat",
                          "title": "Matching Memory",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 3, "x": 21, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
                          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto"},
                          "targets": [
                            {"refId": "A", "expr": "sum(k8s_top_pod_memory_usage_bytes{k8s_namespace_name=~\"$partition\", k8s_pod_name=~\".*$intent.*\"}) OR vector(0)", "legendFormat": "memory"}
                          ]
                        },
                        {
                          "id": 100,
                          "type": "row",
                          "title": "Guardian Intent Stream",
                          "collapsed": false,
                          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
                          "panels": []
                        },
                        {
                          "id": 10,
                          "type": "logs",
                          "title": "Guardian Intent Releases",
                          "datasource": {"type": "loki", "uid": "doctor-logs"},
                          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 6},
                          "options": {"showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending"},
                          "targets": [
                            {"refId": "A", "expr": "{service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\" | partition=~\"$partition\" | intent=~\"$intent\"", "queryType": "range", "direction": "backward"}
                          ]
                        },
                        {
                          "id": 101,
                          "type": "row",
                          "title": "Matched Resource Signals",
                          "collapsed": false,
                          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 16},
                          "panels": []
                        },
                        {
                          "id": 20,
                          "type": "timeseries",
                          "title": "Matching Pod CPU",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 17},
                          "fieldConfig": {"defaults": {"unit": "m", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 18, "gradientMode": "opacity", "showPoints": "never", "axisPlacement": "auto"}}, "overrides": []},
                          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"], "maxItems": 16}, "tooltip": {"mode": "multi", "sort": "desc"}},
                          "targets": [
                            {"refId": "A", "expr": "max by (k8s_namespace_name, k8s_pod_name) (k8s_top_pod_cpu_usage_millicores{k8s_namespace_name=~\"$partition\", k8s_pod_name=~\".*$intent.*\"})", "legendFormat": "{{k8s_namespace_name}}/{{k8s_pod_name}}"}
                          ]
                        },
                        {
                          "id": 21,
                          "type": "timeseries",
                          "title": "Matching Pod Memory",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 17},
                          "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 18, "gradientMode": "opacity", "showPoints": "never", "axisPlacement": "auto"}}, "overrides": []},
                          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"], "maxItems": 16}, "tooltip": {"mode": "multi", "sort": "desc"}},
                          "targets": [
