        - type: Config
          name: grafana-dashboards-system
          version: 20260521-1139
          properties:
            data:
                k8s-cluster-resource-watch.json: |
                    {
                      "uid": "k8s-cluster-resource-watch",
                      "title": "K8s - Cluster Resource Watch",
                      "tags": ["k8s", "cluster", "resources", "grafana-13", "metrics", "logs", "traces"],
                      "schemaVersion": 39,
                      "version": 2,
                      "refresh": "15s",
                      "time": {"from": "now-15m", "to": "now"},
                      "editable": true,
                      "links": [
                        {"title": "System Graph", "type": "dashboards", "tags": ["system", "topology"]},
                        {"title": "Doctor", "type": "dashboards", "tags": ["doctor"]},
                        {"title": "Guardian", "type": "dashboards", "tags": ["guardian"]}
                      ],
                      "annotations": {
                        "list": [
                          {
                            "datasource": {"type": "loki", "uid": "doctor-logs"},
                            "enable": true,
                            "expr": "{service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\"",
                            "hide": false,
                            "iconColor": "#FF780A",
                            "name": "Releases",
                            "titleFormat": "{{partition}}/{{intent}} {{release}}",
                            "textFormat": "deployment: {{deployment_revision}}"
                          }
                        ]
                      },
                      "templating": {"list": [
                        {"name": "filters", "label": "Metric filters", "type": "adhoc", "datasource": {"type": "prometheus", "uid": "prometheus"}, "hide": 0},
                        {"name": "traceId", "label": "Trace ID", "type": "textbox", "query": "latest", "current": {"text": "latest", "value": "latest"}, "hide": 0}
                      ]},
                      "panels": [
                        {
                          "id": 1,
                          "type": "text",
                          "title": "Cluster Resource Watch",
                          "gridPos": {"h": 5, "w": 8, "x": 0, "y": 0},
                          "options": {
                            "mode": "markdown",
                            "content": "### Kubernetes memory and CPU watch\nThis board is fed by the standalone `k8s-top` exporter, which polls the Kubernetes metrics API and forwards OTLP metrics, logs, and traces. It is the Grafana surface for the same cluster load you would usually inspect with `kubectl top pod -A --containers`, but kept in Doctor-backed history.\n\nIf the cards stay empty, check that bootstrap installed `metrics-server` and that the `k8s-top` partition is healthy."
                          }
                        },
                        {
                          "id": 2,
                          "type": "stat",
                          "title": "Observed Pods",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 4, "x": 8, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
                          "options": {
                            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {"refId": "A", "expr": "max(k8s_top_observed_pods) OR vector(0)", "legendFormat": "pods"}
                          ]
                        },
                        {
                          "id": 3,
                          "type": "stat",
                          "title": "Observed Containers",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 4, "x": 12, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
                          "options": {
                            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {"refId": "A", "expr": "max(k8s_top_observed_containers) OR vector(0)", "legendFormat": "containers"}
                          ]
                        },
                        {
                          "id": 4,
                          "type": "stat",
                          "title": "Scrape Lag",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 4, "x": 16, "y": 0},
                          "fieldConfig": {
                            "defaults": {
                              "unit": "s",
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {"color": "green", "value": 0},
                                  {"color": "yellow", "value": 30},
                                  {"color": "red", "value": 90}
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                            "textMode": "auto",
                            "colorMode": "background",
                            "graphMode": "none",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {"refId": "A", "expr": "time() - max(k8s_top_scrape_last_success_unix) OR vector(0)", "legendFormat": "lag"}
                          ]
                        },
                        {
                          "id": 5,
                          "type": "stat",
                          "title": "Scrape Failures / s",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 5, "w": 4, "x": 20, "y": 0},
                          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
                          "options": {
                            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {"refId": "A", "expr": "sum(rate(k8s_top_scrape_failures_total[$__rate_interval])) OR vector(0)", "legendFormat": "failures"}
                          ]
                        },
                        {
                          "id": 100,
                          "type": "row",
                          "title": "Resource Signals",
                          "collapsed": false,
                          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
                          "panels": []
                        },
                        {
                          "id": 10,
                          "type": "timeseries",
                          "title": "Namespace CPU Load",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
                          "fieldConfig": {"defaults": {"unit": "m", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 18, "gradientMode": "opacity", "showPoints": "never", "axisPlacement": "auto"}}, "overrides": []},
                          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"], "maxItems": 12}, "tooltip": {"mode": "multi", "sort": "desc"}},
                          "targets": [
                            {"refId": "A", "expr": "sum by (k8s_namespace_name) (k8s_top_pod_cpu_usage_millicores)", "legendFormat": "{{k8s_namespace_name}}"}
                          ]
                        },
                        {
                          "id": 11,
                          "type": "timeseries",
                          "title": "Namespace Memory Working Set",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
                          "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 18, "gradientMode": "opacity", "showPoints": "never", "axisPlacement": "auto"}}, "overrides": []},
                          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"], "maxItems": 12}, "tooltip": {"mode": "multi", "sort": "desc"}},
                          "targets": [
                            {"refId": "A", "expr": "sum by (k8s_namespace_name) (k8s_top_pod_memory_usage_bytes)", "legendFormat": "{{k8s_namespace_name}}"}
                          ]
                        },
                        {
                          "id": 12,
                          "type": "bargauge",
                          "title": "Top Pods By Memory",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
                          "fieldConfig": {"defaults": {"unit": "bytes", "min": 0}, "overrides": []},
                          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "minVizWidth": 12, "minVizHeight": 8},
                          "targets": [
                            {"refId": "A", "expr": "topk(10, max by (k8s_namespace_name, k8s_pod_name) (k8s_top_pod_memory_usage_bytes))", "legendFormat": "{{k8s_namespace_name}}/{{k8s_pod_name}}"}
                          ]
                        },
                        {
                          "id": 13,
                          "type": "bargauge",
                          "title": "Top Pods By CPU",
                          "datasource": {"type": "prometheus", "uid": "prometheus"},
                          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
                          "fieldConfig": {"defaults": {"unit": "m", "min": 0}, "overrides": []},
                          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "minVizWidth": 12, "minVizHeight": 8},
                          "targets": [
                            {"refId": "A", "expr": "topk(10, max by (k8s_namespace_name, k8s_pod_name) (k8s_top_pod_cpu_usage_millicores))", "legendFormat": "{{k8s_namespace_name}}/{{k8s_pod_name}}"}
                          ]
                        },
                        {
                          "id": 14,
                          "type": "bargauge",
                          "title": "Top Containers By Memory",
