          latest\",\n          \"value\": \"latest\"\n        },\n        \"hide\"\
          : 0\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 1,\n  \
          \    \"type\": \"text\",\n      \"title\": \"Storage Command Center\",\n\
          \      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 8,\n        \"\
          x\": 0,\n        \"y\": 0\n      },\n      \"options\": {\n        \"mode\"\
          : \"markdown\",\n        \"content\": \"### MonoFS live storage\\nA compact\
          \ read/write operations room for the storage path. Top cards show scrape\
