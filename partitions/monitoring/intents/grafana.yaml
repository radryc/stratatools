  - type: Volume
    name: grafana-storage
    version: 20260603-1038
    properties:
      ephemeral: true
  - type: Compute
    name: grafana
    version: 20260603-1038
    dependsOn:
    - grafana-datasources
    - grafana-dashboards-provider
    - grafana-dashboards-monofs
    - grafana-dashboards-guardian
    - grafana-dashboards-doctor
    - grafana-dashboards-system
    - grafana-dashboards-guardian-rollouts
    - grafana-storage
    payload:
      k8s: /partitions/monitoring/payloads/grafana.k8s.yaml
    properties:
      configMounts:
      - config: grafana-datasources
        path: /etc/grafana/provisioning/datasources/datasources.yaml
      - config: grafana-dashboards-provider
        path: /etc/grafana/provisioning/dashboards/dashboards.yaml
      - config: grafana-dashboards-monofs
        path: /etc/grafana/dashboards/monofs
        readOnly: true
      - config: grafana-dashboards-guardian
        path: /etc/grafana/dashboards/guardian
        readOnly: true
      - config: grafana-dashboards-doctor
        path: /etc/grafana/dashboards/doctor
        readOnly: true
      - config: grafana-dashboards-system
        path: /etc/grafana/dashboards/system
        readOnly: true
      - config: grafana-dashboards-guardian-rollouts
        path: /etc/grafana/dashboards/guardian-rollouts
        readOnly: true
      env:
        GF_AUTH_ANONYMOUS_ENABLED: 'true'
        GF_AUTH_ANONYMOUS_ORG_NAME: Main Org.
        GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
        GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/system/system-live-topology.json
        GF_EXPLORE_ENABLED: 'true'
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_SECURITY_ADMIN_USER: admin
        GF_USERS_VIEWERS_CAN_EDIT: 'false'
      image: grafana/grafana:sha256-73d08928237b0c95
      imagePullPolicy: IfNotPresent
      ports:
      - containerPort: 3000
        name: http
        protocol: TCP
        servicePort: 3000
      resources:
        limits:
          cpu: '1'
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 256Mi
      volumeMounts:
      - path: /var/lib/grafana
        volume: grafana-storage
  # TODO(option-b): replace this LoadBalancer asset with a serviceAnnotations
  # entry on the grafana Compute above (guardian.intent/expose + external-port).
  # That lets the lb k8s-agent register grafana pods directly into main lb-edge
  # (single hop) and removes this intermediate lb-edge pod entirely.
  # Same refactor applies to: doctor-edge, agent-edge, dev-workspace-edge.
  - type: LoadBalancer
    name: grafana-edge
    version: 20260603-1038
    dependsOn:
    - grafana
    payload:
      k8s: /partitions/monitoring/payloads/grafana-edge.k8s.yaml
    properties:
      listeners:
      - name: http
        port: 3000
        protocol: TCP
      serviceType: LoadBalancer
      targets:
      - grafana
