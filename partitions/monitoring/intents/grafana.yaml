apiVersion: guardian/v1alpha1
kind: Intent
metadata:
    name: grafana
spec:
    intentType: standard
    targetPusher: k8s-main
    target:
        cluster: k8s-main
        namespace: monitoring
    locked: false
    assets:
        - type: Config
          name: grafana-datasources
          version: 20260521-1139
          properties:
            data:
                datasources.yaml: |
                    apiVersion: 1
                    datasources:
                      - name: Doctor Metrics
                        uid: prometheus
                        type: prometheus
                        access: proxy
                        url: http://k8s-svc-lb-k8s-main-doctor-doctor-query-query-edge.doctor.svc.cluster.local:18080
                        isDefault: true
                        editable: true
                      - name: Doctor Logs
                        uid: doctor-logs
                        type: loki
                        access: proxy
                        url: http://k8s-svc-lb-k8s-main-doctor-doctor-query-query-edge.doctor.svc.cluster.local:18080
                        editable: true
                      - name: Doctor Traces
                        uid: doctor-traces
                        type: zipkin
                        access: proxy
                        url: http://k8s-svc-lb-k8s-main-doctor-doctor-query-query-edge.doctor.svc.cluster.local:18080
                        jsonData:
                          tracesToLogsV2:
                            datasourceUid: doctor-logs
                            spanStartTimeShift: -5m
                            spanEndTimeShift: 5m
                            tags:
                              - service.name
                              - k8s.pod.name
                              - doctor.component
                            filterByTraceID: true
                            filterBySpanID: false
                          traceQuery:
                            timeShiftEnabled: true
                            spanStartTimeShift: 1h
                            spanEndTimeShift: 1h
                          nodeGraph:
                            enabled: true
                          spanBar:
                            type: Duration
                        editable: true
            format: yaml
        - type: Config
          name: grafana-dashboards-provider
          version: 20260521-1139
          properties:
            data:
                dashboards.yaml: |
                    apiVersion: 1
                    providers:
                      - name: MonoFS
                        folder: MonoFS
                        type: file
                        disableDeletion: false
                        editable: true
                        updateIntervalSeconds: 30
                        options:
                          path: /etc/grafana/dashboards/monofs
                      - name: Guardian
                        folder: Guardian
                        type: file
                        disableDeletion: false
                        editable: true
                        updateIntervalSeconds: 30
                        options:
                          path: /etc/grafana/dashboards/guardian
                      - name: Doctor
                        folder: Doctor
                        type: file
                        disableDeletion: false
                        editable: true
                        updateIntervalSeconds: 30
                        options:
                          path: /etc/grafana/dashboards/doctor
                      - name: System
                        folder: System
                        type: file
                        disableDeletion: false
                        editable: true
                        updateIntervalSeconds: 30
                        options:
                          path: /etc/grafana/dashboards/system
                      - name: Guardian Rollouts
                        folder: Guardian Rollouts
                        type: file
                        disableDeletion: false
                        editable: true
                        updateIntervalSeconds: 30
                        options:
                          path: /etc/grafana/dashboards/guardian-rollouts
            format: yaml
        - type: Config
          name: grafana-dashboards-monofs
          version: 20260521-1139
          properties:
            data:
                monofs-comprehensive-health.json: |
                    {
                      "uid": "monofs-comprehensive-health",
                      "title": "MonoFS - Storage Command Center",
                      "tags": [
                        "monofs",
                        "health",
                        "storage",
                        "grafana-13",
                        "logs",
                        "traces"
                      ],
                      "schemaVersion": 39,
                      "version": 4,
                      "refresh": "30s",
                      "time": {
                        "from": "now-15m",
                        "to": "now"
                      },
                      "editable": true,
                      "links": [
                        {
                          "title": "Guardian",
                          "type": "dashboards",
                          "tags": [
                            "guardian"
                          ]
                        },
                        {
                          "title": "Doctor",
                          "type": "dashboards",
                          "tags": [
                            "doctor"
                          ]
                        },
                        {
                          "title": "System Graph",
                          "type": "dashboards",
                          "tags": [
                            "system",
                            "topology"
                          ]
                        }
                      ],
                      "annotations": {
                        "list": [
                          {
                            "datasource": {
                              "type": "loki",
                              "uid": "doctor-logs"
                            },
                            "enable": true,
                            "expr": "{service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\"",
                            "hide": false,
                            "iconColor": "#FF780A",
                            "name": "Releases",
                            "titleFormat": "{{partition}}/{{intent}} {{release}}",
                            "textFormat": "deployment: {{deployment_revision}}"
                          }
                        ]
                      },
                      "templating": {
                        "list": [
                          {
                            "name": "filters",
                            "label": "Metric filters",
                            "type": "adhoc",
                            "datasource": {
                              "type": "prometheus",
                              "uid": "prometheus"
                            },
                            "hide": 0
                          },
                          {
                            "name": "traceId",
                            "label": "Trace ID",
                            "type": "textbox",
                            "query": "latest",
                            "current": {
                              "text": "latest",
                              "value": "latest"
                            },
                            "hide": 0
                          }
                        ]
                      },
                      "panels": [
                        {
                          "id": 1,
                          "type": "text",
                          "title": "Storage Command Center",
                          "gridPos": {
                            "h": 5,
                            "w": 8,
                            "x": 0,
                            "y": 0
                          },
                          "options": {
                            "mode": "markdown",
                            "content": "### MonoFS live storage\nA compact read/write operations room for the storage path. Top cards show scrape coverage and KVS pressure; the flow rows compare ingress, server writes, KVS persistence, and read volume.\n\nUse the **Metric filters** control for ad hoc Prometheus filtering. Logs are signature-deduped below so repeated router health or fetcher noise does not dominate investigation."
                          }
                        },
                        {
                          "id": 2,
                          "type": "stat",
                          "title": "Router Scrape Health",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 8,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "percentunit",
                              "min": 0,
                              "max": 1,
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "red",
                                    "value": 0
                                  },
                                  {
                                    "color": "yellow",
                                    "value": 0.9
                                  },
                                  {
                                    "color": "green",
                                    "value": 0.99
                                  }
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "avg(up{service=\"monofs-router\"}) OR vector(0)",
                              "legendFormat": "router"
                            }
                          ]
                        },
                        {
                          "id": 3,
                          "type": "stat",
                          "title": "Server Scrape Health",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 12,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "percentunit",
                              "min": 0,
                              "max": 1,
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "red",
                                    "value": 0
                                  },
                                  {
                                    "color": "yellow",
                                    "value": 0.9
                                  },
                                  {
                                    "color": "green",
                                    "value": 0.99
                                  }
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "avg(up{service=\"monofs-server\"}) OR vector(0)",
                              "legendFormat": "server"
                            }
                          ]
                        },
                        {
                          "id": 4,
                          "type": "stat",
                          "title": "Storage Write B/s",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 16,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "Bps"
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum(rate(kvs_write_bytes_total[$__rate_interval])) OR vector(0)",
                              "legendFormat": "kvs write"
                            }
                          ]
                        },
                        {
                          "id": 5,
                          "type": "stat",
                          "title": "Active Keys",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 5,
                            "w": 4,
                            "x": 20,
                            "y": 0
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "short"
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "textMode": "auto",
                            "colorMode": "value",
                            "graphMode": "area",
                            "justifyMode": "auto",
                            "orientation": "auto"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "max(kvs_active_keys) OR vector(0)",
                              "legendFormat": "active keys"
                            }
                          ]
                        },
                        {
                          "id": 100,
                          "type": "row",
                          "title": "Signals",
                          "collapsed": false,
                          "gridPos": {
                            "h": 1,
                            "w": 24,
                            "x": 0,
                            "y": 5
                          },
                          "panels": []
                        },
                        {
                          "id": 10,
                          "type": "timeseries",
                          "title": "Ingress And Write Throughput",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 8,
                            "w": 12,
                            "x": 0,
                            "y": 6
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "Bps",
                              "custom": {
                                "drawStyle": "line",
                                "lineInterpolation": "smooth",
                                "fillOpacity": 18,
                                "gradientMode": "opacity",
                                "showPoints": "never",
                                "axisPlacement": "auto"
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "legend": {
                              "displayMode": "table",
                              "placement": "bottom",
                              "calcs": [
                                "lastNotNull",
                                "max"
                              ],
                              "maxItems": 12
                            },
                            "tooltip": {
                              "mode": "multi",
                              "sort": "desc"
                            }
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum(rate(monofs_router_ingest_bytes_total[$__rate_interval]))",
                              "legendFormat": "router ingest B/s"
                            },
                            {
                              "refId": "B",
                              "expr": "sum(rate(monofs_server_write_bytes_total[$__rate_interval]))",
                              "legendFormat": "server write B/s"
                            },
                            {
                              "refId": "C",
                              "expr": "sum(rate(kvs_write_bytes_total[$__rate_interval]))",
                              "legendFormat": "kvs write B/s"
                            }
                          ]
                        },
                        {
                          "id": 11,
                          "type": "timeseries",
                          "title": "Read Path Volume",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 8,
                            "w": 12,
                            "x": 12,
                            "y": 6
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "Bps",
                              "custom": {
                                "drawStyle": "line",
                                "lineInterpolation": "smooth",
                                "fillOpacity": 14,
                                "gradientMode": "opacity",
                                "showPoints": "never",
                                "axisPlacement": "auto"
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "legend": {
                              "displayMode": "table",
                              "placement": "bottom",
                              "calcs": [
                                "lastNotNull",
                                "max"
                              ],
                              "maxItems": 12
                            },
                            "tooltip": {
                              "mode": "multi",
                              "sort": "desc"
                            }
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum(rate(monofs_router_native_read_bytes_total[$__rate_interval]))",
                              "legendFormat": "router read B/s"
                            },
                            {
                              "refId": "B",
                              "expr": "sum(rate(monofs_server_read_bytes_total[$__rate_interval]))",
                              "legendFormat": "server read B/s"
                            },
                            {
                              "refId": "C",
                              "expr": "sum(rate(kvs_read_bytes_total[$__rate_interval]))",
                              "legendFormat": "kvs read B/s"
                            }
                          ]
                        },
                        {
                          "id": 12,
                          "type": "bargauge",
                          "title": "Storage Mutations",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 8,
                            "w": 12,
                            "x": 0,
                            "y": 14
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "ops",
                              "min": 0,
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "green",
                                    "value": 0
                                  },
                                  {
                                    "color": "blue",
                                    "value": 1
                                  },
                                  {
                                    "color": "orange",
                                    "value": 50
                                  }
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "orientation": "horizontal",
                            "displayMode": "gradient",
                            "showUnfilled": true,
                            "minVizWidth": 12,
                            "minVizHeight": 8
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum by (op) (rate(kvs_write_files_total[$__rate_interval]))",
                              "legendFormat": "kvs {{op}}"
                            },
                            {
                              "refId": "B",
                              "expr": "sum by (op) (rate(kvs_pebble_batch_commits_total[$__rate_interval]))",
                              "legendFormat": "pebble {{op}}"
                            }
                          ]
                        },
                        {
                          "id": 13,
                          "type": "timeseries",
                          "title": "Guardian Traffic Through Router",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 8,
                            "w": 12,
                            "x": 12,
                            "y": 14
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "Bps",
                              "custom": {
                                "drawStyle": "line",
                                "lineInterpolation": "smooth",
                                "fillOpacity": 18,
                                "gradientMode": "opacity",
                                "showPoints": "never",
                                "axisPlacement": "auto"
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "legend": {
                              "displayMode": "table",
                              "placement": "bottom",
                              "calcs": [
                                "lastNotNull",
                                "max"
                              ],
                              "maxItems": 10
                            },
                            "tooltip": {
                              "mode": "multi",
                              "sort": "desc"
                            }
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum(rate(monofs_router_guardian_upsert_bytes_total[$__rate_interval]))",
                              "legendFormat": "guardian upsert B/s"
                            },
                            {
                              "refId": "B",
                              "expr": "sum(rate(monofs_router_guardian_version_store_write_bytes_total[$__rate_interval]))",
                              "legendFormat": "version store B/s"
                            }
                          ]
                        },
                        {
                          "id": 14,
                          "type": "bargauge",
                          "title": "Server Operations By Op",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 8,
                            "w": 12,
                            "x": 0,
                            "y": 22
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "ops",
                              "min": 0,
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "green",
                                    "value": 0
                                  },
                                  {
                                    "color": "blue",
                                    "value": 1
                                  },
                                  {
                                    "color": "orange",
                                    "value": 100
                                  }
                                ]
                              }
                            },
                            "overrides": []
                          },
                          "options": {
                            "reduceOptions": {
                              "calcs": [
                                "lastNotNull"
                              ],
                              "fields": "",
                              "values": false
                            },
                            "orientation": "horizontal",
                            "displayMode": "gradient",
                            "showUnfilled": true,
                            "minVizWidth": 12,
                            "minVizHeight": 8
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "sum by (op) (rate(monofs_server_ops_total[$__rate_interval]))",
                              "legendFormat": "{{op}}"
                            }
                          ]
                        },
                        {
                          "id": 15,
                          "type": "timeseries",
                          "title": "Scrape Health By Job",
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "gridPos": {
                            "h": 8,
                            "w": 12,
                            "x": 12,
                            "y": 22
                          },
                          "fieldConfig": {
                            "defaults": {
                              "unit": "percentunit",
                              "min": 0,
                              "max": 1
                            },
                            "overrides": []
                          },
                          "options": {
                            "legend": {
                              "displayMode": "table",
                              "placement": "bottom",
                              "calcs": [
                                "lastNotNull"
                              ],
                              "maxItems": 16
                            },
                            "tooltip": {
                              "mode": "multi",
                              "sort": "desc"
                            }
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "avg by (component, pod) (up) * on(component) group_left() (label_replace(vector(1), \"component\", \"monofs-router\", \"__name__\", \".*\") OR label_replace(vector(1), \"component\", \"monofs-server\", \"__name__\", \".*\"))",
                              "legendFormat": "{{component}}/{{pod}}"
                            }
                          ]
                        },
                        {
                          "id": 101,
                          "type": "row",
                          "title": "Logs And Traces",
                          "collapsed": false,
                          "gridPos": {
                            "h": 1,
                            "w": 24,
                            "x": 0,
                            "y": 30
                          },
                          "panels": []
                        },
                        {
                          "id": 20,
                          "type": "logs",
                          "title": "Recent MonoFS Logs",
                          "datasource": {
                            "type": "loki",
                            "uid": "doctor-logs"
                          },
                          "gridPos": {
                            "h": 12,
                            "w": 24,
                            "x": 0,
                            "y": 31
                          },
                          "options": {
                            "showTime": true,
                            "showLabels": true,
                            "showCommonLabels": false,
                            "wrapLogMessage": true,
                            "enableLogDetails": true,
                            "dedupStrategy": "signature",
                            "sortOrder": "Descending"
                          },
                          "targets": [
                            {
                              "refId": "A",
                              "expr": "{service=~\"monofs.*\"}",
                              "queryType": "range",
                              "direction": "backward"
                            }
                          ]
                        },
                        {
                          "id": 21,
                          "type": "traces",
                          "title": "MonoFS Trace Waterfall",
                          "datasource": {
                            "type": "zipkin",
                            "uid": "doctor-traces"
                          },
                          "gridPos": {
                            "h": 18,
                            "w": 24,
                            "x": 0,
                            "y": 43
                          },
                          "options": {},
                          "targets": [
                            {
                              "refId": "A",
                              "queryType": "traceID",
                              "query": "$traceId"
                            }
                          ]
                        }
                      ]
                    }
            format: json
        - type: Config
          name: grafana-dashboards-guardian
          version: 20260521-1139
          properties:
            data:
                guardian-comprehensive-health.json: |
                    {
                      "uid": "guardian-comprehensive-health",
                      "title": "Guardian - Control Loop Flight Deck",
                      "tags": ["guardian", "health", "control-loop", "grafana-13", "logs", "traces"],
                      "schemaVersion": 39,
                      "version": 4,
                      "refresh": "30s",
                      "time": {"from": "now-15m", "to": "now"},
                      "editable": true,
                      "links": [
                        {"title": "MonoFS", "type": "dashboards", "tags": ["monofs"]},
                        {"title": "Doctor", "type": "dashboards", "tags": ["doctor"]},
                        {"title": "System Graph", "type": "dashboards", "tags": ["system", "topology"]}
                      ],
                      "annotations": {
                        "list": [
                          {
                            "datasource": {"type": "loki", "uid": "doctor-logs"},
                            "enable": true,
                            "expr": "{service=\"guardian\"} |= \"results: release\" | logfmt | status=\"Succeeded\"",
                            "hide": false,
                            "iconColor": "#FF780A",
                            "name": "Releases",
                            "titleFormat": "{{partition}}/{{intent}} {{release}}",
                            "textFormat": "deployment: {{deployment_revision}}"
                          }
                        ]
                      },
                      "templating": {"list": [
                        {"name": "filters", "label": "Metric filters", "type": "adhoc", "datasource": {"type": "prometheus", "uid": "prometheus"}, "hide": 0},
                        {"name": "traceId", "label": "Trace ID", "type": "textbox", "query": "latest", "current": {"text": "latest", "value": "latest"}, "hide": 0}
                      ]},
                      "panels": [
                        {
