          \ router health or fetcher noise does not dominate investigation.\"\n  \
          \    }\n    },\n    {\n      \"id\": 2,\n      \"type\": \"stat\",\n   \
          \   \"title\": \"Router Scrape Health\",\n      \"datasource\": {\n    \
          \    \"type\": \"prometheus\",\n        \"uid\": \"prometheus\"\n      },\n\
          \      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 4,\n        \"\
          x\": 8,\n        \"y\": 0\n      },\n      \"fieldConfig\": {\n        \"\
          defaults\": {\n          \"unit\": \"percentunit\",\n          \"min\":\
          \ 0,\n          \"max\": 1,\n          \"thresholds\": {\n            \"\
          mode\": \"absolute\",\n            \"steps\": [\n              {\n     \
          \           \"color\": \"red\",\n                \"value\": 0\n        \
          \      },\n              {\n                \"color\": \"yellow\",\n   \
          \             \"value\": 0.9\n              },\n              {\n      \
          \          \"color\": \"green\",\n                \"value\": 0.99\n    \
          \          }\n            ]\n          }\n        },\n        \"overrides\"\
          : []\n      },\n      \"options\": {\n        \"reduceOptions\": {\n   \
          \       \"calcs\": [\n            \"lastNotNull\"\n          ],\n      \
