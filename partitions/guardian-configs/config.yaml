apiVersion: guardian/v1alpha1
kind: Partition
metadata:
  name: guardian-configs
  labels:
    role: control-plane
spec:
  deletionPolicy: orphan
  reconciliation:
    mode: auto
    interval: 1m
  labels:
    stack: k8s
    component: guardian
    topology: kubernetes
    managedBy: guardian
    endpoint: http://127.0.0.1:8090
guardian_ui_base_url: http://172.18.0.14:8090
