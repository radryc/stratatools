<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <defs>
        <linearGradient id="gradStep1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#1d4ed8" />
        </linearGradient>
        <linearGradient id="gradStep2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#6d28d9" />
        </linearGradient>
        <linearGradient id="gradStep3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ec4899" />
            <stop offset="100%" stop-color="#be185d" />
        </linearGradient>
        <linearGradient id="gradStep4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#047857" />
        </linearGradient>

        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
        </marker>
    </defs>

    <text x="450" y="40" fill="#f8fafc" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">MonoFS Developer Workflow</text>

    <path d="M 150 150 L 750 150" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)" />

    <g transform="translate(60, 110)">
        <circle cx="90" cy="40" r="40" fill="url(#gradStep1)" />
        <text x="90" y="46" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">1</text>
        <text x="90" y="110" fill="#f8fafc" font-size="16" font-weight="bold" text-anchor="middle">Bootstrap Cluster</text>
        <text x="90" y="130" fill="#94a3b8" font-size="12" text-anchor="middle">mt-bootstrap deploy</text>
        <text x="90" y="150" fill="#94a3b8" font-size="12" text-anchor="middle">mt-release --partition</text>
    </g>

    <g transform="translate(250, 110)">
        <circle cx="90" cy="40" r="40" fill="url(#gradStep2)" />
        <text x="90" y="46" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">2</text>
        <text x="90" y="110" fill="#f8fafc" font-size="16" font-weight="bold" text-anchor="middle">Ingest Repos</text>
        <text x="90" y="130" fill="#94a3b8" font-size="12" text-anchor="middle">monofs-admin ingest</text>
        <text x="90" y="150" fill="#94a3b8" font-size="12" text-anchor="middle">--source=... --ref=main</text>
    </g>

    <g transform="translate(440, 110)">
        <circle cx="90" cy="40" r="40" fill="url(#gradStep3)" />
        <text x="90" y="46" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">3</text>
        <text x="90" y="110" fill="#f8fafc" font-size="16" font-weight="bold" text-anchor="middle">Mount &amp; Code</text>
        <text x="90" y="130" fill="#94a3b8" font-size="12" text-anchor="middle">monofs-client --mount</text>
        <text x="90" y="150" fill="#94a3b8" font-size="12" text-anchor="middle">git status | IDE editing</text>
    </g>

    <g transform="translate(630, 110)">
        <circle cx="90" cy="40" r="40" fill="url(#gradStep4)" />
        <text x="90" y="46" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">4</text>
        <text x="90" y="110" fill="#f8fafc" font-size="16" font-weight="bold" text-anchor="middle">Publish Changes</text>
        <text x="90" y="130" fill="#94a3b8" font-size="12" text-anchor="middle">monofs-session commit</text>
        <text x="90" y="150" fill="#94a3b8" font-size="12" text-anchor="middle">monofs-session push</text>
    </g>
</svg>
