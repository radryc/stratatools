# MonoFS with MinIO S3 Backend
# 
# This compose file extends the main docker-compose.yml with MinIO S3 storage.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.s3.yml up -d
#
# Or use the make command:
#   make deploy-s3

x-otel-syslog-logging: &otel-syslog-logging
  logging:
    driver: syslog
    options:
      syslog-address: "tcp://127.0.0.1:1514"
      syslog-format: rfc5424micro
      tag: "{{.Name}}"

services:
  # MinIO S3-compatible object storage
  minio:
    <<: *otel-syslog-logging
    image: minio/minio:latest
    ports:
      - "19000:9000"  # S3 API
      - "19001:9001"  # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - monofs-net
      - monofs-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Create the monofs bucket on startup
  minio-init:
    <<: *otel-syslog-logging
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/monofs || true;
      /usr/bin/mc policy set download myminio/monofs || true;
      exit 0;
      "
    networks:
      - monofs-net

  # Fetcher 1 with S3 backend
  fetcher-a:
    command:
      - "monofs-fetcher"
      - "--port=9200"
      - "--cache-dir=/data/cache"
      - "--max-cache-gb=20"
      - "--cache-age-hours=2"
      - "--prefetch-workers=4"
      - "--log-level=info"
      - "--config=/etc/monofs/fetcher-s3.json"
    environment:
      - MONOFS_ENCRYPTION_KEY=${MONOFS_ENCRYPTION_KEY}
      - MONOFS_S3_REGION=us-east-1
      - MONOFS_S3_BUCKET=monofs
      - MONOFS_S3_ENDPOINT=http://minio:9000
      - MONOFS_S3_ACCESS_KEY_ID=minioadmin
      - MONOFS_S3_SECRET_ACCESS_KEY=minioadmin
      - MONOFS_S3_USE_PATH_STYLE=true
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # Fetcher 2 with S3 backend
  fetcher-b:
    command:
      - "monofs-fetcher"
      - "--port=9200"
      - "--cache-dir=/data/cache"
      - "--max-cache-gb=20"
      - "--cache-age-hours=2"
      - "--prefetch-workers=4"
      - "--log-level=info"
      - "--config=/etc/monofs/fetcher-s3.json"
    environment:
      - MONOFS_ENCRYPTION_KEY=${MONOFS_ENCRYPTION_KEY}
      - MONOFS_S3_REGION=us-east-1
      - MONOFS_S3_BUCKET=monofs
      - MONOFS_S3_ENDPOINT=http://minio:9000
      - MONOFS_S3_ACCESS_KEY_ID=minioadmin
      - MONOFS_S3_SECRET_ACCESS_KEY=minioadmin
      - MONOFS_S3_USE_PATH_STYLE=true
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  minio-data:
