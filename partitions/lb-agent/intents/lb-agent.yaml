# This partition deploys the lb k8s-agent into the lb-edge namespace.
# It watches all namespaces for K8s services annotated with
# guardian.intent/expose: "true" and auto-registers them with the main lb-edge
# registry gRPC on monofs-external.lb-edge.svc.cluster.local:15051.
#
# Current model (Option A - two-hop):
#   user → main lb-edge :PORT → per-partition lb-edge pod → target pod
#   LoadBalancer assets carry serviceAnnotations so k8s-agent picks them up.
#
# TODO(option-b - single-hop):
#   Remove per-partition LoadBalancer assets (grafana-edge, doctor-edge, etc.).
#   Add serviceAnnotations directly to the Compute asset payload instead:
#     serviceAnnotations:
#       guardian.intent/expose: "true"
#       guardian.intent/external-port: "3000"
#   k8s-agent then registers the Compute pod IPs directly — no intermediate hop.
apiVersion: guardian/v1alpha1
kind: Intent
metadata:
  name: lb-agent
spec:
  intentType: standard
  targetPusher: k8s-main
  target:
    cluster: k8s-main
    namespace: lb-edge
  locked: false
  assets:
  - type: Compute
    name: lb-k8s-agent
    version: 20260603-1200
    payload:
      k8s: /partitions/lb-agent/payloads/k8s-agent.k8s.yaml
    properties:
      image: lb:sha256-8be5dd53984da3f3
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
